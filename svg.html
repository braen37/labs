<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>SVG Графіка</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f2f5;
            padding: 30px;
            text-align: center;
        }
        .svg-container {
            background: white;
            padding: 20px;
            margin: 20px auto;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.05);
            max-width: 600px;
            border: 1px solid #ddd;
        }
        h3 { color: #333; margin-top: 0; }
        .back-link { display: inline-block; margin-top: 20px; color: #007bff; text-decoration: none; }
    </style>
</head>
<body>

    <h2>Векторна графіка SVG</h2>

    <div class="svg-container">
        <h3>1. Здивований Смайлик (Еліпси, Кола, Тінь)</h3>
        <svg width="300" height="320" viewBox="0 0 300 320">
            <ellipse cx="150" cy="280" rx="65" ry="15" fill="#cccccc" opacity="0.8" />
            <circle cx="150" cy="150" r="100" fill="#ffcc00" />
            <ellipse cx="115" cy="120" rx="35" ry="30" fill="#ffffff" />
            <ellipse cx="185" cy="120" rx="35" ry="30" fill="#ffffff" />
            <circle cx="115" cy="120" r="10" fill="#000000" />
            <circle cx="185" cy="120" r="10" fill="#000000" />
            <ellipse cx="150" cy="210" rx="10" ry="22" fill="#d61a3c" />
        </svg>
    </div>

    <div class="svg-container">
        <h3>2. Математичні оператори (Лінії, обводка, згини)</h3>
        <svg width="500" height="120" viewBox="0 0 500 120" style="border: 1px solid #eee;">
            <line x1="20" y1="60" x2="100" y2="60" stroke="#008080" stroke-width="16" stroke-linecap="square" />
            <line x1="60" y1="20" x2="60" y2="100" stroke="#008080" stroke-width="16" stroke-linecap="square" />
            
            <line x1="120" y1="60" x2="200" y2="60" stroke="#ff4500" stroke-width="16" stroke-linecap="square" />
            
            <line x1="220" y1="25" x2="290" y2="95" stroke="#4169e1" stroke-width="16" stroke-linecap="square" />
            <line x1="290" y1="25" x2="220" y2="95" stroke="#4169e1" stroke-width="16" stroke-linecap="square" />
            
            <line x1="320" y1="95" x2="390" y2="25" stroke="#800080" stroke-width="16" stroke-linecap="square" />
            
            <line x1="410" y1="45" x2="480" y2="45" stroke="#ffa500" stroke-width="14" />
            <line x1="410" y1="75" x2="480" y2="75" stroke="#ffa500" stroke-width="14" />
        </svg>
    </div>

    <div class="svg-container">
        <h3>3. Кульки (Прямокутник із закругленням, Багатокутники, Ламані лінії)</h3>
        <svg width="300" height="400" viewBox="0 0 300 400">
            <rect x="10" y="10" width="280" height="380" rx="20" fill="#fff9d6" />
            
            <circle cx="120" cy="150" r="70" fill="#d61a3c" />
            <polygon points="120,220 113,230 127,230" fill="#d61a3c" />
            <polyline points="120,230 135,260 120,290 130,320 110,350 130,380" fill="none" stroke="#a1665e" stroke-width="2" />

            <ellipse cx="190" cy="190" rx="45" ry="60" fill="#ffcc00" />
            <polygon points="190,250 184,258 196,258" fill="#ffcc00" />
            <polyline points="190,258 200,290 185,320 195,340 180,370 195,390" fill="none" stroke="#a1665e" stroke-width="2" />
        </svg>
    </div>

    <br>
    <a href="index.html" class="back-link">← На головну сторінку</a>
</body>
</html>
